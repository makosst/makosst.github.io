<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>{{ page.title }}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      body {
        max-width: 760px;
        margin: 60px auto;
        padding: 0 20px;
        font-family: system-ui, sans-serif;
        line-height: 1.6;
      }

      a {
        color: inherit;
      }

      pre {
        overflow-x: auto;
        padding: 12px;
        background: #f5f5f5;

      code {
        background: #f5f5f5;
        padding: 2px 4px;
      }

      pre code {
        padding: 0;
      }
    </style>
  </head>
  <body>
    {{ content }}
  </body>
</html>
